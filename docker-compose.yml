services:
  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports: ["${WEB_PORT:-3000}:3000"]
    depends_on: [api]
  api:
    build: ./apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://traffic:traffic@postgres:5432/traffic}
      REDIS_URL: redis://redis:6379/0
      TOMTOM_API_KEY: ${TOMTOM_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-z-ai/glm-4.6}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    ports: ["${API_PORT:-8000}:8000"]
    depends_on: [postgres, redis, minio]
  worker:
    build: ./apps/api
    command: python worker.py
    environment:
      REDIS_URL: redis://redis:6379/0
      SUMO_BINARY: sumo
    depends_on: [redis]
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: traffic
      POSTGRES_USER: traffic
      POSTGRES_PASSWORD: traffic
    volumes: ["postgres-data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: traffic
      MINIO_ROOT_PASSWORD: change-me
    ports: ["127.0.0.1:9001:9001"]
    volumes: ["minio-data:/data"]
volumes:
  postgres-data:
  minio-data:
